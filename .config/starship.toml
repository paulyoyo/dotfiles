palette = 'salvaje'

# 1:1 port of https://starship.rs/presets/gruvbox-rainbow
# Only the 10 palette hex values are changed to the Salvaje palette.
# Variable names kept identical so this stays diffable against upstream.
#
#   color_fg0     Bright Snow    #F7F7F5
#   color_bg1     Near-black     #120E15
#   color_bg3     Lilac-grey     #2A1A38
#   color_blue    Deep Lilac     #8956BA
#   color_aqua    Teal           #6AAFB8
#   color_green   Sage           #8FBF6C
#   color_orange  Wisteria       #C599E2
#   color_purple  Bright Lilac   #A474D4
#   color_red     Rose           #E0637A
#   color_yellow  Golden Glow    #EAD82F
[palettes.salvaje]
color_fg0    = '#F7F7F5'
color_bg1    = '#120E15'
color_bg3    = '#2A1A38'
color_blue   = '#8956BA'
color_aqua   = '#6AAFB8'
color_green  = '#8FBF6C'
color_orange = '#C599E2'
color_purple = '#A474D4'
color_red    = '#E0637A'
