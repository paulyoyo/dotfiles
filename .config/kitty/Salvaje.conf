# vim:ft=kitty
## name:     Salvaje
## author:   Paul
## blurb:    Warm dark theme built from 5 anchor colors — Deep Lilac,
##           Bright Snow, Golden Glow, Black, Wisteria. Remaining colors
##           derived via split-complementary / triadic relationships.
##
## Anchor palette:
##   Deep Lilac   #8956BA  (primary accent — hue ~275°)
##   Bright Snow  #F7F7F5  (foreground)
##   Golden Glow  #EAD82F  (cursor, warm accent — hue ~55°)
##   Black        #060100  (canvas)
##   Wisteria     #C599E2  (magenta — lighter Lilac, hue ~275°)

# ── Basic ────────────────────────────────────────────────────────────
foreground           #F7F7F5
background           #060100
# Golden Glow on Black for selection — high contrast against every
# other color in the terminal (no Claude Code / starship / zellij
# surface uses pure yellow, so the highlight is always visible).
selection_foreground #060100
selection_background #EAD82F

# ── Cursor ───────────────────────────────────────────────────────────
cursor            #EAD82F
cursor_text_color #060100

# ── URL ──────────────────────────────────────────────────────────────
url_color #C599E2

# ── Window borders / bell ────────────────────────────────────────────
active_border_color   #8956BA
inactive_border_color #2A1A38
bell_border_color     #EAD82F
visual_bell_color     none

# ── Tab bar ──────────────────────────────────────────────────────────
active_tab_foreground   #060100
active_tab_background   #C599E2
inactive_tab_foreground #9A8EA6
inactive_tab_background #120E15
tab_bar_background      #060100
tab_bar_margin_color    none

# ── Marks ────────────────────────────────────────────────────────────
mark1_foreground #060100
mark1_background #C599E2
mark2_foreground #060100
mark2_background #E0637A
mark3_foreground #060100
mark3_background #EAD82F

# ── 16 ANSI colors ───────────────────────────────────────────────────

# black — canvas tones (near-black with faint purple undertone)
color0  #120E15
color8  #2A1A38

# red — warm rose (split-complement of Deep Lilac)
color1  #E0637A
color9  #F07A90

# green — muted sage (triadic partner of Deep Lilac)
color2  #8FBF6C
color10 #A8D480

# yellow — Golden Glow
color3  #EAD82F
color11 #F2E66A

# blue — Deep Lilac (used as blue channel)
color4  #8956BA
color12 #A474D4

# magenta — Wisteria
color5  #C599E2
color13 #D8B8EE

# cyan — lavender-teal bridge (analogous to Lilac, cooler)
color6  #6AAFB8
color14 #88CCD4

# white — Bright Snow family
color7  #C8C2BA
color15 #F7F7F5
