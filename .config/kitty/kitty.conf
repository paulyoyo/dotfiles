# ~/.config/kitty/kitty.conf
# Minimal config — see https://sw.kovidgoyal.net/kitty/conf/ for all options.

# ── Theme ────────────────────────────────────────────────────────────
include Salvaje.conf

# ── Fonts ────────────────────────────────────────────────────────────
# Primary: GT Pressura LCGV Mono (commercial, from Grilli Type).
# Install the .ttf files from the licensed source into ~/Library/Fonts/
# on each new machine — they are NOT tracked in this public dotfiles
# repo (licensing). See README for details.
font_family      family="GT Pressura LCGV Mono"
bold_font        family="GT Pressura LCGV Mono" style="Bold"
italic_font      family="GT Pressura LCGV Mono" style="Regular Italic"
bold_italic_font family="GT Pressura LCGV Mono" style="Bold Italic"
font_size        18

# Symbol fallback — GT Pressura has no Nerd Font icons or braille
# glyphs, so map those Unicode ranges to MesloLGS Nerd Font Mono.
# These are rendered below the application layer, so starship icons,
# LazyVim file-tree icons, zellaude activity symbols, and the kitty
# startup banner (braille sigil) all work transparently.
symbol_map U+2800-U+28FF MesloLGS Nerd Font Mono
symbol_map U+E000-U+F8FF MesloLGS Nerd Font Mono
symbol_map U+F0000-U+FFFFD MesloLGS Nerd Font Mono
symbol_map U+100000-U+10FFFD MesloLGS Nerd Font Mono

# GT Pressura Mono renders with kitty default cell metrics; no
# modify_font adjustments needed.

# ── Window ───────────────────────────────────────────────────────────
window_margin_width        10
single_window_margin_width 0

# Smooth window resize (no stepped snap)
window_resize_step_cells  2
window_resize_step_lines  2
resize_in_steps           no

# ── Cursor animations ────────────────────────────────────────────────
# Smear/trail effect behind the cursor — kitty renders this below the
# application layer, so it works in neovim, zellij, REPLs, everything.
cursor_trail                  3
cursor_trail_decay            0.1 0.4
cursor_trail_start_threshold  2

# Blink slowly, stop blinking after 15s of inactivity
cursor_blink_interval         0.5
cursor_stop_blinking_after    15.0

# ── Visual bell ──────────────────────────────────────────────────────
visual_bell_duration          0.08
visual_bell_color             #EAD82F
bell_on_tab                   "🔔 "

# ── macOS ────────────────────────────────────────────────────────────
macos_titlebar_color background

# ── Shell wrapper ────────────────────────────────────────────────────
# Invoke a tiny wrapper that prints the Salvaje welcome banner then
# execs zsh. Fires on every new kitty OS window and tab (not just
# process startup), guaranteeing the banner is always visible before
# zellij / shell activity.
#
# Goes through `bash -c` so the wrapper path uses $HOME, making this
# line portable across machines (kitty config parser does not expand
# environment variables itself — bash does it at exec time). The inner
# double-quotes preserve spaces in $HOME (required on this $HOME which
# contains spaces).
shell bash -c 'exec "$HOME/.config/kitty/salvaje-shell.sh"'
