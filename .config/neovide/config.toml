# ~/.config/neovide/config.toml
# Routes Neovide to the pwnvim config (~/.config/pwnvim) via a wrapper
# that sets NVIM_APPNAME=pwnvim. Terminal nvim continues to use the
# LazyVim config at ~/.config/nvim unchanged.
#
# To update pwnvim: cd ~/.config/pwnvim && git pull && NVIM_APPNAME=pwnvim nvim --headless "+Lazy! sync" +qa

# Neovide passes neovim-bin through `zsh -l -c <path>` without quoting,
# so any space in the path fails ("zsh:1: no such file or directory:
# /Volumes/El"). Point at a symlink in /opt/homebrew/bin (no spaces)
# that resolves to the real wrapper at $HOME/.local/bin/nvim-pwnvim.
# The symlink is created by the post-checkout step documented in README.
neovim-bin = "/opt/homebrew/bin/nvim-pwnvim"

# Performance / appearance tuning for Neovide on macOS + Salvaje theme
frame            = "full"
maximized        = false
no-idle          = false
srgb             = false
tabs             = true
theme            = "dark"
title-hidden     = false
vsync            = true

[font]
normal = ["GT Pressura LCGV Mono", "MesloLGS Nerd Font Mono"]
size   = 18
